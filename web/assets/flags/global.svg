<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" role="img" aria-label="Global">
    <!-- Ocean -->
    <circle cx="18" cy="18" r="17" fill="#4fb4e8"/>

    <g fill="#2f9e44">
        <!-- Eurasia: continuous band across the top (Europe + Asia together) -->
        <path d="M9 8
                 Q13 6, 18 7
                 Q23 7, 28 9
                 Q29 10, 28 12
                 Q25 13, 22 12
                 Q19 13, 16 12
                 Q12 12, 10 11
                 Q8 10, 9 8 Z"/>

        <!-- Africa: wide at Sahara, tapers to south cape -->
        <path d="M13 13
                 Q16 12, 20 13
                 Q23 14, 22 16
                 Q22 18, 22 20
                 Q22 23, 20 26
                 Q18 28, 17 27
                 Q15 24, 15 21
                 Q14 18, 14 15
                 Q13 14, 13 13 Z"/>

        <!-- Arabian peninsula -->
        <path d="M21 13 Q24 13, 24 15 Q23 16, 22 16 Q21 15, 21 13 Z"/>

        <!-- Madagascar -->
        <ellipse cx="24" cy="23" rx="0.8" ry="2" transform="rotate(15 24 23)"/>

        <!-- South America hint -->
        <path d="M5 19
                 Q7 19, 8 22
                 Q8 26, 7 27
                 Q5 27, 5 24
                 Q4 21, 5 19 Z"/>

        <!-- North America hint -->
        <path d="M4 10
                 Q6 9, 9 11
                 Q9 13, 7 14
                 Q4 14, 3 12
                 Q3 10, 4 10 Z"/>
    </g>

    <!-- Subtle outline -->
    <circle cx="18" cy="18" r="17" fill="none" stroke="#2078c4" stroke-width="0.5"/>
</svg>
